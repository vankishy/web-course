- name: Buat user khusus Prometheus
  user:
    name: prometheus
    shell: /bin/false
    system: yes

- name: Buat direktori konfigurasi
  file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
  loop:
    - /etc/prometheus
    - /var/lib/prometheus

- name: Download dan Ekstrak Prometheus
  unarchive:
    src: https://github.com/prometheus/prometheus/releases/download/v2.53.1/prometheus-2.53.1.linux-amd64.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Pindahkan Binary Prometheus ke /usr/local/bin
  copy:
    src: /tmp/prometheus-2.53.1.linux-amd64/prometheus
    dest: /usr/local/bin/prometheus
    mode: '0755'
    owner: prometheus
    group: prometheus
    remote_src: yes

- name: Pindahkan Binary Promtool
  copy:
    src: /tmp/prometheus-2.53.1.linux-amd64/promtool
    dest: /usr/local/bin/promtool
    mode: '0755'
    owner: prometheus
    group: prometheus
    remote_src: yes

- name: Pindahkan Config Console Libraries
  copy:
    src: "/tmp/prometheus-2.53.1.linux-amd64/{{ item }}/"
    dest: "/etc/prometheus/{{ item }}/"
    owner: prometheus
    group: prometheus
    remote_src: yes
  loop:
    - console_libraries
    - consoles

- name: Upload File Konfigurasi Prometheus (dari Template)
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus

- name: Buat File Service Systemd
  copy:
    dest: /etc/systemd/system/prometheus.service
    content: |
      [Unit]
      Description=Prometheus
      Wants=network-online.target
      After=network-online.target

      [Service]
      User=prometheus
      Group=prometheus
      Type=simple
      ExecStart=/usr/local/bin/prometheus \
        --config.file /etc/prometheus/prometheus.yml \
        --storage.tsdb.path /var/lib/prometheus/ \
        --web.console.templates=/etc/prometheus/consoles \
        --web.console.libraries=/etc/prometheus/console_libraries

      [Install]
      WantedBy=multi-user.target

- name: Jalankan Service Prometheus
  systemd:
    name: prometheus
    state: started
    enabled: yes
    daemon_reload: yes
    # --- Batas Tugas Prometheus di atas, ini Tugas Node Exporter ---

- name: Download dan Unzip Node Exporter
  unarchive:
    src: https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-amd64.tar.gz
    dest: /usr/local/bin/
    remote_src: yes
    extra_opts: [--strip-components=1]
    creates: /usr/local/bin/node_exporter

- name: Buat file Service Node Exporter
  copy:
    dest: /etc/systemd/system/node_exporter.service
    content: |
      [Unit]
      Description=Node Exporter
      After=network.target

      [Service]
      User=root
      ExecStart=/usr/local/bin/node_exporter

      [Install]
      WantedBy=multi-user.target

- name: Jalankan Node Exporter
  systemd:
    name: node_exporter
    state: started
    enabled: yes
    daemon_reload: yes